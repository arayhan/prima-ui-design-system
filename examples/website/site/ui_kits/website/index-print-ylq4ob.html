function App() {

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);
  React.useEffect(() => {
    document.documentElement.setAttribute('data-view', view);
  }, [view]);

    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    localStorage.setItem('arayhan-theme', next);
  };
  const go = (v) => {
    setView(v); setPostId(null);
    localStorage.setItem('arayhan-view', v);
  };
  const openPost = (id) => { setPostId(id); setView('post'); };

  React.useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [view, postId]);

    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setPaletteOpen((o) => !o); }
      if (e.key === 'Escape') setPaletteOpen(false);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <React.Fragment>
      <ADS.ScrollProgress />
      <Nav view={view === 'post' ? 'blog' : view} go={go} theme={theme} onToggleTheme={toggleTheme} onOpenPalette={() => setPaletteOpen(true)} />
      {view === 'home' && <HomeScreen go={go} />}
      {view === 'blog' && <BlogListScreen openPost={openPost} />}
      {view === 'post' && <BlogPostScreen postId={postId} back={() => go('blog')} openPost={openPost} />}
      {view === 'uses' && <UsesScreen />}
      {view === 'contact' && <ContactScreen />}
      <Footer />
      <ScrollTopButton />
      <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} go={go} />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
