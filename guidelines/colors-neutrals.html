<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Slate scale — surfaces & text in both themes" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
body { display:flex; gap:0; padding:16px; }
.sw { flex:1; height:118px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; font-family:var(--font-mono); font-size:10px; }
.sw:first-child { border-radius:10px 0 0 10px; border:1px solid var(--slate-200); } .sw:last-child { border-radius:0 10px 10px 0; }
</style></head><body>
<div class="sw" style="background:var(--slate-0); color:var(--slate-500);">0</div>
<div class="sw" style="background:var(--slate-50); color:var(--slate-500);">50</div>
<div class="sw" style="background:var(--slate-100); color:var(--slate-500);">100</div>
<div class="sw" style="background:var(--slate-200); color:var(--slate-600);">200</div>
<div class="sw" style="background:var(--slate-300); color:var(--slate-700);">300</div>
<div class="sw" style="background:var(--slate-400); color:#fff;">400</div>
<div class="sw" style="background:var(--slate-500); color:#fff;">500</div>
<div class="sw" style="background:var(--slate-600); color:#fff;">600</div>
<div class="sw" style="background:var(--slate-700); color:#fff;">700</div>
<div class="sw" style="background:var(--slate-800); color:#fff;">800</div>
<div class="sw" style="background:var(--slate-900); color:#fff;">900</div>
<div class="sw" style="background:var(--slate-950); color:#fff;">950</div>
</body></html>
